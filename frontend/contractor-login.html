<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contractor Login</title><link rel="stylesheet" href="css/styles.css"></head><body><header class="topbar"><div class="brand">FAIR LOGISTICS</div></header><main class="shell"><form id="loginForm" class="card auth"><h1 class="title">Contractor Login</h1><p class="muted">Use your contractor ID and assigned PIN.</p><div id="msg" class="notice"></div><div class="field"><label>Contractor ID</label><input id="contractorCode" required autocomplete="username"></div><br><div class="field"><label>PIN</label><input id="pin" type="password" inputmode="numeric" required autocomplete="current-password"></div><br><button class="btn btn-primary" type="submit">Continue</button></form></main><script src="js/config.js"></script><script src="js/common.js"></script><script src="js/contractor-login.js"></script></body></html>
