<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Manager Login</title><link rel="stylesheet" href="css/styles.css"></head><body><header class="topbar"><div class="brand">FAIR LOGISTICS</div></header><main class="shell"><form id="loginForm" class="card auth"><h1 class="title">Manager Login</h1><div id="msg" class="notice"></div><div class="field"><label>Email</label><input id="email" type="email" required></div><br><div class="field"><label>Password</label><input id="password" type="password" required></div><br><button class="btn btn-primary">Sign in</button></form></main><script src="js/config.js"></script><script src="js/common.js"></script><script>loginForm.addEventListener('submit',async e=>{e.preventDefault();try{const d=await api('/auth/manager/login',{method:'POST',body:JSON.stringify({email:email.value,password:password.value})});localStorage.setItem('manager_token',d.token);localStorage.setItem('manager_user',JSON.stringify(d.user));location.href='manager-dashboard.html'}catch(e){show('msg',e.message)}})</script></body></html>
