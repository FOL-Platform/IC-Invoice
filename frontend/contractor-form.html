<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Contractor Invoice</title><link rel="stylesheet" href="css/styles.css"></head><body><header class="topbar"><div class="brand">FAIR LOGISTICS</div><nav class="navlinks"><a href="contractor-history.html">My Invoices</a><button class="btn btn-secondary" onclick="logout('contractor','contractor-login.html')">Log out</button></nav></header><main class="shell"><form id="invoiceForm" class="card"><h1 class="title">Daily Contractor Invoice</h1><p class="muted" id="identity"></p><div id="msg" class="notice"></div><div class="grid"><div class="field"><label>Service Date *</label><input type="date" id="serviceDate" required></div><div class="field"><label>Branch *</label><input id="branch" required></div><div class="field"><label>Client / Account</label><input id="clientAccount"></div><div class="field"><label>Route / Assignment</label><input id="routeAssignment"></div><div class="field"><label>Service Start Time *</label><input type="time" id="startTime" required></div><div class="field"><label>Service End Time *</label><input type="time" id="endTime" required></div><div class="field"><label>Unpaid Break (minutes)</label><input type="number" id="breakMinutes" min="0" max="720" value="0"></div><div class="field"><label>Calculated Hours</label><input id="calculatedHours" readonly value="0.00"></div><div class="field full checkbox"><input type="checkbox" id="mileageApplicable"><label for="mileageApplicable">Mileage applies to this invoice</label></div><div id="mileageFields" class="grid field full hidden"><div class="field"><label>Total Miles</label><input type="number" id="totalMiles" min="0" step="0.01" value="0"></div><div class="field"><label>Mileage Reason</label><input id="mileageReason"></div></div><div class="field"><label>Tolls</label><input type="number" id="tolls" min="0" step="0.01" value="0"></div><div class="field"><label>Parking</label><input type="number" id="parking" min="0" step="0.01" value="0"></div><div class="field"><label>Other Reimbursable Expense</label><input type="number" id="otherExpense" min="0" step="0.01" value="0"></div><div class="field full"><label>Notes</label><textarea id="notes" maxlength="1000"></textarea></div><div class="field full checkbox"><input type="checkbox" id="certified" required><label for="certified">I certify that the services listed were performed by me and that this invoice is true and accurate.</label></div></div><br><div class="actions"><button class="btn btn-primary" type="submit">Submit Daily Invoice</button></div></form></main><script src="js/config.js"></script><script src="js/common.js"></script><script src="js/contractor-form.js"></script></body></html>
