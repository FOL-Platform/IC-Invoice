<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Payroll Export</title><link rel="stylesheet" href="css/styles.css"></head><body><header class="topbar"><div class="brand">FAIR LOGISTICS • Payroll Export</div><nav class="navlinks"><a href="manager-dashboard.html">Dashboard</a></nav></header><main class="shell"><div class="card auth"><h1 class="title">Export Approved Invoices</h1><p class="muted">Choose the service-date range.</p><div id="msg" class="notice"></div><div class="grid"><div class="field"><label>Start Date</label><input type="date" id="start"></div><div class="field"><label>End Date</label><input type="date" id="end"></div></div><br><button class="btn btn-primary" id="download">Download CSV</button></div></main><script src="js/config.js"></script><script src="js/common.js"></script><script>if(!token('manager'))location.href='manager-login.html';download.onclick=async()=>{try{const r=await fetch(`${API}/manager/export.csv?start=${start.value}&end=${end.value}`,{headers:{Authorization:`Bearer ${token('manager')}`}});if(!r.ok)throw new Error((await r.json()).error);const b=await r.blob(),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`approved-invoices-${start.value}-to-${end.value}.csv`;a.click();URL.revokeObjectURL(u)}catch(e){show('msg',e.message)}};</script></body></html>
