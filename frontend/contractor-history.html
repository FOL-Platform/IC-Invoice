<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Invoices</title><link rel="stylesheet" href="css/styles.css"></head><body><header class="topbar"><div class="brand">FAIR LOGISTICS</div><nav class="navlinks"><a href="contractor-form.html">New Invoice</a><button class="btn btn-secondary" onclick="logout('contractor','contractor-login.html')">Log out</button></nav></header><main class="shell"><div class="card"><h1 class="title">My Recent Invoices</h1><div id="msg" class="notice"></div><div class="table-wrap"><table><thead><tr><th>Invoice</th><th>Date</th><th>Hours</th><th>Miles</th><th>Status</th><th>Manager Comment</th></tr></thead><tbody id="rows"></tbody></table></div></div></main><script src="js/config.js"></script><script src="js/common.js"></script><script>if(!token('contractor'))location.href='contractor-login.html';api('/contractor/invoices',{kind:'contractor'}).then(data=>rows.innerHTML=data.map(x=>`<tr><td>${x.invoice_number}</td><td>${dateFmt(x.service_date)}</td><td>${x.total_hours}</td><td>${x.total_miles}</td><td><span class="badge ${x.status}">${x.status}</span></td><td>${x.manager_comment||''}</td></tr>`).join('')).catch(e=>show('msg',e.message));</script></body></html>
